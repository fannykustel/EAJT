<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Egyetemes Jogtörténet – Teszt</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Source+Serif+4:ital,wght@0,300;0,400;0,600;1,300&display=swap');

:root {
  --bg:      #f5f0e8;
  --surf:    #ede8de;
  --surf2:   #e4ddd0;
  --border:  #c8bfae;
  --gold:    #8a6d3b;
  --text:    #3a3228;
  --dim:     #7a6e60;

  --A-bg:    #f0e8d0; --A-border: #b09040; --A-text: #6b5020;
  --B-bg:    #dde8f0; --B-border: #4a7aaa; --B-text: #2a4a6a;
  --C-bg:    #ddeedd; --C-border: #4a8a5a; --C-text: #2a5a38;
  --D-bg:    #f0e0d4; --D-border: #aa6644; --D-text: #6a3820;

  --correct: #d4edda; --correct-border: #4a8a5a; --correct-text: #1e4a2a;
  --wrong:   #f4d4d4; --wrong-border:   #aa3333; --wrong-text:   #6a1a1a;
  --reveal:  #e0d8f0; --reveal-border:  #6a50aa; --reveal-text:  #3a2870;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Source Serif 4', Georgia, serif;
  font-size: 15px;
  line-height: 1.7;
}

/* ── HEADER ── */
header {
  border-bottom: 1px solid var(--border);
  padding: 1.5rem 2rem 1rem;
  display: flex;
  align-items: flex-end;
  gap: 2rem;
  flex-wrap: wrap;
}
header h1 {
  font-family: 'Playfair Display', serif;
  font-size: 1.6rem;
  color: var(--gold);
  line-height: 1.1;
}
header p { color: var(--dim); font-size: .85rem; font-style: italic; }
.score-box {
  margin-left: auto;
  background: var(--surf);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: .5rem 1.2rem;
  text-align: center;
  font-size: .8rem;
  color: var(--dim);
  min-width: 120px;
}
.score-box strong { display:block; font-size:1.6rem; color:var(--gold); font-family:'Playfair Display',serif; }

/* ── NAV ── */
nav {
  display: flex;
  gap: .4rem;
  padding: .8rem 2rem;
  border-bottom: 1px solid var(--border);
  flex-wrap: wrap;
}
.nav-btn {
  background: var(--surf);
  border: 1px solid var(--border);
  color: var(--dim);
  padding: .3rem .8rem;
  border-radius: 3px;
  cursor: pointer;
  font-family: 'Source Serif 4', serif;
  font-size: .78rem;
  transition: all .15s;
  white-space: nowrap;
}
.nav-btn:hover, .nav-btn.active {
  border-color: var(--gold);
  color: var(--gold);
  background: var(--surf2);
}

/* ── MAIN ── */
main {
  max-width: 860px;
  margin: 0 auto;
  padding: 2rem 2rem 4rem;
}

.section { display:none; }
.section.visible { display:block; }

.section-head {
  margin-bottom: 1.5rem;
  padding-bottom: .8rem;
  border-bottom: 1px solid var(--border);
}
.section-head h2 {
  font-family: 'Playfair Display', serif;
  font-size: 1.25rem;
  color: var(--gold);
  margin-bottom: .4rem;
}
.section-head p { color: var(--dim); font-size: .82rem; }

/* ── LEGEND ── */
.legend {
  display: flex;
  flex-wrap: wrap;
  gap: .6rem 1.4rem;
  margin: .6rem 0 1.2rem;
  font-size: .78rem;
}
.legend-item {
  display: flex;
  align-items: center;
  gap: .4rem;
  color: var(--dim);
}
.legend-dot {
  width: 10px; height: 10px;
  border-radius: 50%;
  display: inline-block;
}

/* ── QUESTION CARD ── */
.q-card {
  background: var(--surf);
  border: 1px solid var(--border);
  border-radius: 6px;
  margin-bottom: 1.2rem;
  overflow: hidden;
  transition: border-color .2s;
}
.q-card.answered-correct { border-color: var(--correct-border); }
.q-card.answered-wrong   { border-color: var(--wrong-border); }
.q-card.answered-reveal  { border-color: var(--reveal-border); }

.q-body {
  padding: 1rem 1.2rem .6rem;
  display: flex;
  gap: .8rem;
  align-items: flex-start;
}
.q-num {
  font-family: 'Playfair Display', serif;
  color: var(--dim);
  min-width: 1.8rem;
  padding-top: .1rem;
  font-size: .95rem;
}
.q-text { flex:1; font-size: .9rem; line-height: 1.65; }
.q-text .sep { color: var(--gold); font-weight: bold; margin: 0 .3rem; }

/* ── ANSWER BUTTONS ── */
.q-options {
  display: flex;
  flex-wrap: wrap;
  gap: .5rem;
  padding: .5rem 1.2rem 1rem 3.8rem;
}

.opt-btn {
  border: 1px solid var(--border);
  background: var(--surf2);
  color: var(--dim);
  padding: .35rem .9rem;
  border-radius: 4px;
  cursor: pointer;
  font-family: 'Source Serif 4', serif;
  font-size: .82rem;
  font-weight: 600;
  letter-spacing: .02em;
  transition: all .15s;
  display: flex;
  align-items: center;
  gap: .4rem;
}
.opt-btn:hover:not(:disabled) {
  border-color: var(--gold);
  color: var(--gold);
}

/* per-answer colors on hover */
.opt-btn[data-opt="A"]:hover:not(:disabled) { border-color: var(--A-border); color: var(--A-text); background: var(--A-bg); }
.opt-btn[data-opt="B"]:hover:not(:disabled) { border-color: var(--B-border); color: var(--B-text); background: var(--B-bg); }
.opt-btn[data-opt="C"]:hover:not(:disabled) { border-color: var(--C-border); color: var(--C-text); background: var(--C-bg); }
.opt-btn[data-opt="D"]:hover:not(:disabled) { border-color: var(--D-border); color: var(--D-text); background: var(--D-bg); }
.opt-btn[data-opt="E"]:hover:not(:disabled) { border-color: #b06cc0; color: #d0a0e0; background: #1a0a28; }
.opt-btn[data-opt="IGAZ"]:hover:not(:disabled)  { border-color: var(--correct-border); color: var(--correct-text); background: var(--correct); }
.opt-btn[data-opt="HAMIS"]:hover:not(:disabled) { border-color: var(--wrong-border);   color: var(--wrong-text);   background: var(--wrong); }

/* after answer: selected states */
.opt-btn.selected-correct {
  border-color: var(--correct-border) !important;
  color: var(--correct-text) !important;
  background: var(--correct) !important;
  cursor: default;
}
.opt-btn.selected-wrong {
  border-color: var(--wrong-border) !important;
  color: var(--wrong-text) !important;
  background: var(--wrong) !important;
  cursor: default;
  text-decoration: line-through;
  opacity: .7;
}
.opt-btn.correct-reveal {
  border-color: var(--correct-border) !important;
  color: var(--correct-text) !important;
  background: var(--correct) !important;
  cursor: default;
}
.opt-btn.skipped-reveal {
  border-color: var(--reveal-border) !important;
  color: var(--reveal-text) !important;
  background: var(--reveal) !important;
  cursor: default;
}
.opt-btn:disabled { cursor: default; }

/* ── EXPLANATION ── */
.q-explain {
  display: none;
  margin: 0 1.2rem .9rem 3.8rem;
  padding: .6rem .9rem;
  background: rgba(201,168,76,.07);
  border-left: 3px solid var(--gold);
  border-radius: 0 4px 4px 0;
  font-size: .82rem;
  color: var(--dim);
  font-style: italic;
  line-height: 1.6;
}
.q-explain.show { display: block; }

/* result icon */
.q-result {
  display: none;
  font-size: 1rem;
  padding-top: .1rem;
  min-width: 1.4rem;
  text-align: center;
}
.q-result.show { display: block; }

/* ── TOOLBAR ── */
.toolbar {
  display: flex;
  gap: .6rem;
  margin-bottom: 1.4rem;
  flex-wrap: wrap;
}
.tool-btn {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--dim);
  padding: .4rem 1rem;
  border-radius: 3px;
  cursor: pointer;
  font-family: 'Source Serif 4', serif;
  font-size: .8rem;
  transition: all .15s;
}
.tool-btn:hover { border-color: var(--gold); color: var(--gold); }

/* ── TIMELINE ── */
.timeline-wrap {
  background: var(--surf);
  border: 1px solid var(--border);
  border-radius: 6px;
  margin-bottom: 1.2rem;
  padding: 1.2rem;
}
.timeline-wrap h3 {
  font-family: 'Playfair Display', serif;
  color: var(--gold);
  font-size: 1rem;
  margin-bottom: .8rem;
}
.tl-item {
  display: flex;
  align-items: center;
  gap: .8rem;
  padding: .5rem .8rem;
  background: var(--surf2);
  border: 1px solid var(--border);
  border-radius: 4px;
  margin-bottom: .4rem;
  font-size: .88rem;
}
.tl-opts { display: flex; gap: .4rem; flex-shrink: 0; }
.tl-label {
  flex: 1;
}
.tl-year {
  font-family: 'Playfair Display', serif;
  color: var(--gold);
  min-width: 3.5rem;
  text-align: right;
  font-size: .88rem;
  opacity: 0;
  transition: opacity .3s;
}
.tl-year.show { opacity: 1; }

/* ── EXAM MODE ── */
#exam-view { display:none; }
#exam-view.visible { display:block; }
.exam-picker { max-width:860px; margin:0 auto; padding:2rem; }
.exam-picker h2 { font-family:'Playfair Display',serif; font-size:1.3rem; color:var(--gold); margin-bottom:1.5rem; }
.exam-cards { display:grid; grid-template-columns:repeat(auto-fill,minmax(260px,1fr)); gap:1rem; }
.exam-card { background:var(--surf); border:1px solid var(--border); border-radius:8px; padding:1.2rem; cursor:pointer; transition:border-color .15s,background .15s; }
.exam-card:hover { border-color:var(--gold); background:var(--surf2); }
.exam-card h3 { font-family:'Playfair Display',serif; font-size:1rem; color:var(--gold); margin-bottom:.4rem; }
.exam-card p { font-size:.78rem; color:var(--dim); line-height:1.5; }
.exam-active { max-width:860px; margin:0 auto; padding:1.5rem 2rem 4rem; display:none; }
.exam-active.visible { display:block; }
.exam-back { background:transparent; border:1px solid var(--border); color:var(--dim); padding:.35rem .9rem; border-radius:4px; cursor:pointer; font-size:.82rem; margin-bottom:1.5rem; transition:all .15s; }
.exam-back:hover { border-color:var(--gold); color:var(--gold); }
.exam-toolbar { display:flex; gap:8px; flex-wrap:wrap; align-items:center; padding:1rem 0; border-top:1px solid var(--border); margin-top:1.5rem; }
.exam-hint { font-size:.8rem; color:var(--dim); }
.result-box { background:var(--surf); border:1px solid var(--border); border-radius:8px; padding:1rem; margin-top:1.5rem; display:none; }
.result-box.show { display:block; }
.result-box h3 { font-size:.9rem; color:var(--gold); margin-bottom:.6rem; }
.result-box pre { font-size:.75rem; line-height:1.7; white-space:pre-wrap; color:var(--text); background:var(--bg); padding:.75rem; border-radius:6px; border:1px solid var(--border); max-height:280px; overflow-y:auto; }
.eq-card { background:var(--surf); border:1px solid var(--border); border-radius:6px; margin-bottom:.6rem; overflow:hidden; }
.eq-card.ok { border-color:#2e7d4f; } .eq-card.err { border-color:#aa3333; } .eq-card.rev { border-color:#6a50aa; }
.eq-body { display:flex; align-items:flex-start; gap:8px; padding:.75rem 1rem .45rem; }
.eq-num { font-size:.82rem; color:var(--dim); min-width:1.8rem; padding-top:1px; }
.eq-text { flex:1; font-size:.88rem; line-height:1.6; }
.eq-text .sep { color:var(--gold); font-weight:bold; margin:0 .25rem; }
.eq-res { font-size:.95rem; min-width:1.2rem; padding-top:1px; }
.eq-opts { display:flex; flex-wrap:wrap; gap:5px; padding:.3rem 1rem .75rem 3.6rem; }
.eq-exp { margin:0 1rem .75rem 3.6rem; padding:.45rem .75rem; background:var(--bg); border-left:3px solid var(--gold); font-size:.78rem; color:var(--dim); font-style:italic; line-height:1.55; display:none; }
.eq-exp.show { display:block; }
.eq-tl-box { background:var(--surf); border:1px solid var(--border); border-radius:8px; padding:1rem; margin-bottom:.6rem; }
.eq-tl-row { display:flex; align-items:center; gap:8px; padding:5px 0; border-bottom:1px solid var(--border); }
.eq-tl-row:last-of-type { border-bottom:none; }
.eq-tl-label { flex:1; font-size:.88rem; }
.eq-tl-year { font-size:.8rem; color:var(--dim); min-width:34px; text-align:right; opacity:0; transition:opacity .3s; }
.eq-tl-year.show { opacity:1; }
.eq-tl-opts { display:flex; gap:3px; flex-shrink:0; }
</style>
</head>
<body>

<header>
  <div>
    <h1>Egyetemes Jogtörténet</h1>
    <p>Interaktív tesztfeladatok · 2025–2026 vizsgalapok alapján</p>
  </div>
  <div class="score-box">
    <strong id="score-val">–</strong>
    helyes válasz
  </div>
</header>

<nav id="main-nav"></nav><div id="exam-nav" style="border-bottom:1px solid var(--border);padding:.6rem 2rem;background:var(--surf2);"><button class="nav-btn" id="exam-mode-btn" onclick="enterExamMode()">📝 Vizsgázás</button></div>

<main id="main-content"></main>
<div id="exam-view"><div class="exam-picker" id="exam-picker"></div><div class="exam-active" id="exam-active"></div></div>

<script>
// ─────────────────────────────────────────────
// ADATOK
// ─────────────────────────────────────────────

const OPTS_ABCD = [
  { v:'A', label:'A – mindkét fele igaz' },
  { v:'B', label:'B – csak az első fele igaz' },
  { v:'C', label:'C – csak a második fele igaz' },
  { v:'D', label:'D – egyik fele sem igaz' },
];
const OPTS_NACI = [
  { v:'A', label:'A – csak a náci Né.-ra igaz' },
  { v:'B', label:'B – csak a szovjet bjogra igaz' },
  { v:'C', label:'C – mindkettőre igaz' },
  { v:'D', label:'D – egyikre sem igaz' },
];
const OPTS_1791_1793 = [
  { v:'A', label:'A – csak az 1791-esre igaz' },
  { v:'B', label:'B – csak az 1793-asra igaz' },
  { v:'C', label:'C – mindkettőre igaz' },
  { v:'D', label:'D – egyikre sem igaz' },
];
const OPTS_USA_FR = [
  { v:'A', label:'A – csak az USA 1787-esre igaz' },
  { v:'B', label:'B – csak az 1791-es franciára igaz' },
  { v:'C', label:'C – mindkettőre igaz' },
  { v:'D', label:'D – egyikre sem igaz' },
];
const OPTS_WEIMAR = [
  { v:'A', label:'A – csak a Német Birodalom 1871-re igaz' },
  { v:'B', label:'B – csak a Weimari (1919) alkotmányra igaz' },
  { v:'C', label:'C – mindkettőre igaz' },
  { v:'D', label:'D – egyikre sem igaz' },
];
const OPTS_SULLY = [
  { v:'A', label:'A – csak Sully Nagy Tervére igaz' },
  { v:'B', label:'B – csak Saint-Pierre Európa-tervére igaz' },
  { v:'C', label:'C – mindkettőre igaz' },
  { v:'D', label:'D – egyikre sem igaz' },
];
const OPTS_EJENY = [
  { v:'A', label:'A – mindkét fele igaz' },
  { v:'B', label:'B – csak az első fele igaz' },
  { v:'C', label:'C – csak a második fele igaz' },
  { v:'D', label:'D – egyik fele sem igaz' },
];
const OPTS_CODE_ABGB = [
  { v:'A', label:'A – csak a Code civilre igaz' },
  { v:'B', label:'B – csak az ABGB-re igaz' },
  { v:'C', label:'C – mindkettőre igaz' },
  { v:'D', label:'D – egyikre sem igaz' },
];
const OPTS_IH = [
  { v:'IGAZ',  label:'IGAZ' },
  { v:'HAMIS', label:'HAMIS' },
];

const SECTIONS = [
  {
    id: 'ketfeles-ptk',
    title: 'Kétfelés – magánjogi kódexek',
    sub: 'Code civil · BGB · ABGB',
    opts: OPTS_ABCD,
    items: [
      { q: 'A francia Code civil kodifikációja során Napóleon részt vett az Államtanács ülésein <span class="sep">‖</span> de a tartalmi kérdésekben nem foglalt állást.', ans:'B', exp:'Napóleon valóban részt vett az üléseken, de aktívan és szenvedélyesen hozzászólt – pl. a házassági jog vitáiban komoly szerepe volt. Az első fele igaz, a második hamis.' },
      { q: 'A Német Polgári Törvénykönyv felosztásában az institúció-rendszert követi <span class="sep">‖</span> szerkezetileg öt részre (könyvre) tagolódik.', ans:'C', exp:'A BGB a pandekta-rendszert követi (NEM az institúciót!), de valóban 5 részre tagolódik: általános rész, kötelmi jog, dologi jog, családjog, öröklési jog.' },
      { q: 'A Német Polgári Törvénykönyv egységteremtő érdeme vitathatatlan <span class="sep">‖</span> a hatályba léptető rendelkezések között azonban a részállamok magánjogba vágó korábbi szabályainak jelentős részét érvényesnek tekintette.', ans:'A', exp:'Mindkét fele igaz. A BGB Németország magánjogi egységét teremtette meg, ugyanakkor az átmeneti rendelkezések sok tartományi jogot életben tartottak.' },
      { q: 'Az Osztrák Polgári Törvénykönyv védi a méhmagzat jogait <span class="sep">‖</span> de a rabszolgaságot és az örökös szolgaságot nem tilalmazza.', ans:'B', exp:'Az ABGB valóban védi a méhmagzat jogait. Azonban az ABGB kifejezetten tiltja a rabszolgaságot – aki az állam területére lép, ipso iure felszabadul.' },
      { q: 'Az Osztrák Polgári Törvénykönyv szerint a törvényt általánosan kötelező jelleggel csak a Legfelsőbb Bíróság értelmezheti <span class="sep">‖</span> de kivételesen megengedhető az analógia is.', ans:'C', exp:'Az ABGB szerint a törvényt általánosan kötelező jelleggel csak a TÖRVÉNYHOZÓ értelmezheti (nem a bíróság, ez a csapda!). A második rész igaz: kivételesen az analógia megengedett (7. §).' },
      { q: 'A Német Polgári Törvénykönyv házassági vagyonjogi szabályaiban erősen tükröződnek a germán tradíciók <span class="sep">‖</span> öröklési szabályaiban a római jog hatása érzik.', ans:'A', exp:'Mindkét állítás helyes. A BGB vegyes örökséget hordoz: a vagyonjogban germán, az öröklési jogban római jogi gyökerek dominálnak.' },
      { q: 'A Német Polgári Törvénykönyv 1900. január 1-jén lépett hatályba <span class="sep">‖</span> absztrakt fogalmi rendszer, tárgyszerűség és tudományos precizitás jellemzi.', ans:'A', exp:'Mindkét fele igaz. A BGB 1900. január 1-jén lépett hatályba, és a pandektisztika elvont, tudományos jellegét viseli magán.' },
      { q: 'Az Osztrák Polgári Törvénykönyv szerint a házasság szerződés <span class="sep">‖</span> e szerződést pedig a feleknek – bizonyos bontóokok fennállása esetén – joguk van önhatalmúlag is megszüntetni.', ans:'B', exp:'Az ABGB valóban szerződésnek tekinti a házasságot. De önhatalmú megszüntetésre nincs jog – a felbontás csak bírói úton lehetséges.' },
      { q: 'Az Osztrák Polgári Törvénykönyv szerint a szokásjogot csak akkor lehet alkalmazni, ha valamely törvény hivatkozik rá <span class="sep">‖</span> a természetjog alkalmazása azonban tilos.', ans:'B', exp:'Az ABGB valóban korlátozza a szokásjogot (csak törvényi utalás esetén alkalmazható). A természetjog alkalmazása azonban NEM tilos – épp ellenkezőleg, hézagpótlóként hívható fel (7. §).' },
      { q: 'Az Osztrák Polgári Törvénykönyv nem tesz különbséget a törvényes és a házasságon kívül született gyermekek között <span class="sep">‖</span> rájuk ugyanazon szabályok vonatkoznak és teljesen egyenjogúak.', ans:'D', exp:'Az ABGB igenis különbséget tesz: a házasságon kívüli gyerekek csak részben örökölhetnek, az apaság elismerése szükséges. Teljes egyenjogúságuk csak a Weimari alkotmány (1919) hatása nyomán valósult meg.' },
    ]
  },
  {
    id: 'naci-szovjet',
    title: 'Náci vs Szovjet büntetőjog',
    sub: 'A/B = csak egyikre · C = mindkettőre · D = egyikre sem',
    opts: OPTS_NACI,

const TL_CORRECT  = 'width:32px;height:32px;border-radius:8px;border:2px solid #2e7d4f;background:#d4edda;color:#1a4a2e;font-size:13px;font-weight:500;cursor:default;display:inline-flex;align-items:center;justify-content:center;';

function updateScore() {
  document.getElementById('score-val').textContent =
    totalAnswered > 0 ? `${totalCorrect}/${totalAnswered}` : '–';
}

// ─────────────────────────────────────────────
// NAV
// ─────────────────────────────────────────────
function buildNav() {
  const nav = document.getElementById('main-nav');
  SECTIONS.forEach((s, i) => {
    const btn = document.createElement('button');
    btn.className = 'nav-btn' + (i === 0 ? ' active' : '');
    btn.textContent = s.title;
    btn.onclick = () => {
      document.querySelectorAll('.section').forEach(el => el.classList.remove('visible'));
      document.querySelectorAll('.nav-btn').forEach(el => el.classList.remove('active'));
      document.getElementById('sec-' + s.id).classList.add('visible');
      btn.classList.add('active');
    };
    nav.appendChild(btn);
  });
}

// ─────────────────────────────────────────────
// QUESTION SECTIONS
// ─────────────────────────────────────────────
function buildSections() {
  const main = document.getElementById('main-content');
  SECTIONS.forEach((s, si) => {
    const div = document.createElement('div');
    div.className = 'section' + (si === 0 ? ' visible' : '');
    div.id = 'sec-' + s.id;

    if (s.type === 'timeline') {
      div.appendChild(buildTimelineSection(s));
    } else {
      div.appendChild(buildQSection(s));
    }
    main.appendChild(div);
  });
}

function buildQSection(s) {
  const wrap = document.createElement('div');

  // header
  const colors = { A:'#b09040', B:'#4a7aaa', C:'#4a8a5a', D:'#aa6644', IGAZ:'#4a8a5a', HAMIS:'#aa3333' };
  const legendHTML = s.opts.map(o =>
    `<span class="legend-item"><span class="legend-dot" style="background:${colors[o.v]||'#888'}"></span>${o.label}</span>`
  ).join('');

  wrap.innerHTML = `
    <div class="section-head">
      <h2>${s.title}</h2>
      <p>${s.sub}</p>
      <div class="legend">${legendHTML}</div>
    </div>
    <div class="toolbar">
      <button class="tool-btn" id="reveal-${s.id}">Mutasd az összes helyes választ</button>
      <button class="tool-btn" id="reset-${s.id}">Visszaállítás</button>
    </div>
    <div id="cards-${s.id}"></div>`;

  const cardsContainer = wrap.querySelector('#cards-' + s.id);
  const cardObjects = [];

  function renderCards() {
    cardsContainer.innerHTML = '';
    cardObjects.length = 0;
    s.items.forEach((item, idx) => {
      const obj = buildQCard(s, item, idx);
      cardObjects.push(obj);
      cardsContainer.appendChild(obj.el);
    });
  }

  wrap.querySelector('#reveal-' + s.id).addEventListener('click', () => {
    cardObjects.forEach(obj => obj.reveal());
  });
  wrap.querySelector('#reset-' + s.id).addEventListener('click', () => {
    renderCards();
  });

  renderCards();
  return wrap;
}

function buildQCard(s, item, idx) {
  const cardEl = document.createElement('div');
  cardEl.className = 'q-card';
  cardEl.id = 'card-' + s.id + '-' + idx;

  const bodyEl = document.createElement('div');
  bodyEl.className = 'q-body';
  bodyEl.innerHTML = `<span class="q-num">${idx+1}.</span><span class="q-text">${item.q}</span>`;
  const resultEl = document.createElement('span');
  resultEl.className = 'q-result';
  bodyEl.appendChild(resultEl);

  const optsEl = document.createElement('div');
  optsEl.className = 'q-options';

  const expEl = document.createElement('div');
  expEl.className = 'q-explain';
  expEl.textContent = item.exp;

  let answered = false;
  const btnMap = {};

  s.opts.forEach(o => {
    const btn = document.createElement('button');
    btn.style.cssText = S_DEFAULT;
    const label = o.label.includes('–') ? o.label.split('–')[1].trim() : '';
    btn.innerHTML = (o.v === 'IGAZ' ? '✓ IGAZ' : o.v === 'HAMIS' ? '✗ HAMIS' : o.v) +
      (label ? `<span style="font-weight:400;font-size:.75rem;opacity:.8"> ${label}</span>` : '');
    btnMap[o.v] = btn;

    btn.addEventListener('click', () => {
      if (answered) return;

      // highlight selected immediately
      Object.values(btnMap).forEach(b => { b.style.cssText = S_DEFAULT; });
      btn.style.cssText = S_SELECTED;

      // lock and evaluate
      answered = true;
      const isRight = o.v === item.ans;

      setTimeout(() => {
        Object.values(btnMap).forEach(b => {
          const v = Object.keys(btnMap).find(k => btnMap[k] === b);
          if (v === item.ans) {
            b.style.cssText = (isRight && v === o.v) ? S_CORRECT : S_REVEAL;
          } else if (v === o.v && !isRight) {
            b.style.cssText = S_WRONG;
          } else {
            b.style.cssText = S_DEFAULT;
            b.style.cursor = 'default';
          }
        });

        resultEl.textContent = isRight ? '✓' : '✗';
        resultEl.style.color = isRight ? '#2e7d4f' : '#aa3333';
        resultEl.classList.add('show');
        expEl.classList.add('show');
        cardEl.classList.add(isRight ? 'answered-correct' : 'answered-wrong');

        totalAnswered++;
        if (isRight) totalCorrect++;
        updateScore();
      }, 120);
    });

    optsEl.appendChild(btn);
  });

  cardEl.appendChild(bodyEl);
  cardEl.appendChild(optsEl);
  cardEl.appendChild(expEl);

  return {
    el: cardEl,
    reveal: () => {
      if (answered) return;
      answered = true;
      Object.entries(btnMap).forEach(([v, b]) => {
        b.style.cssText = v === item.ans ? S_REVEAL : S_DEFAULT;
        b.style.cursor = 'default';
      });
      resultEl.textContent = '→';
      resultEl.style.color = '#6a50aa';
      resultEl.classList.add('show');
      expEl.classList.add('show');
      cardEl.classList.add('answered-reveal');
      totalAnswered++;
      updateScore();
    }
  };
}

// ─────────────────────────────────────────────
// TIMELINE SECTION
// ─────────────────────────────────────────────
function buildTimelineSection(s) {
  const wrap = document.createElement('div');

  const head = document.createElement('div');
  head.className = 'section-head';
  head.innerHTML = `<h2>${s.title}</h2><p>${s.sub}</p>`;
  wrap.appendChild(head);

  s.groups.forEach((g, gi) => {
    const shuffled = [...g.items].sort(() => Math.random() - 0.5);
    const selections = {};
    const rowBtnMap = {};

    const groupWrap = document.createElement('div');
    groupWrap.className = 'timeline-wrap';
    groupWrap.innerHTML = `<h3>${g.title}</h3>`;

    shuffled.forEach((item, ii) => {
      const rowId = `tl-${gi}-${ii}`;
      const row = document.createElement('div');
      row.className = 'tl-item';
      row.id = 'tl-row-' + rowId;
      row.dataset.ans = item.letter;

      const btnGroup = document.createElement('div');
      btnGroup.className = 'tl-opts';
      btnGroup.style.cssText = 'display:flex;gap:4px;flex-shrink:0;';
      const btns = {};

      ['A','B','C','D','E'].forEach(l => {
        const btn = document.createElement('button');
        btn.style.cssText = TL_DEFAULT;
        btn.textContent = l;
        btns[l] = btn;

        btn.addEventListener('click', () => {
          if (groupWrap.dataset.checked) return;
          Object.values(btns).forEach(b => { b.style.cssText = TL_DEFAULT; });
          btn.style.cssText = TL_SELECTED;
          selections[rowId] = l;
          const allRows = groupWrap.querySelectorAll('.tl-item');
          const allDone = [...allRows].every(r => selections[r.id.replace('tl-row-','')]);
          checkBtn.disabled = !allDone;
          if (allDone) hint.textContent = '';
        });

        btnGroup.appendChild(btn);
      });

      rowBtnMap[rowId] = btns;

      const labelEl = document.createElement('span');
      labelEl.className = 'tl-label';
      labelEl.textContent = item.label;

      const yearEl = document.createElement('span');
      yearEl.className = 'tl-year';
      yearEl.id = 'tl-year-' + rowId;
      yearEl.textContent = item.year;

      row.appendChild(btnGroup);
      row.appendChild(labelEl);
      row.appendChild(yearEl);
      groupWrap.appendChild(row);
    });

    const bottomRow = document.createElement('div');
    bottomRow.style.cssText = 'display:flex;gap:8px;margin-top:1rem;flex-wrap:wrap;align-items:center;';

    const checkBtn = document.createElement('button');
    checkBtn.className = 'tool-btn';
    checkBtn.textContent = 'Ellenőrzés';
    checkBtn.disabled = true;

    const revBtn = document.createElement('button');
    revBtn.className = 'tool-btn';
    revBtn.textContent = 'Mutasd a válaszokat';

    const hint = document.createElement('span');
    hint.style.cssText = 'font-size:12px;color:var(--dim);';
    hint.textContent = 'Válassz minden sorból egy betűt';

    function evaluate() {
      if (groupWrap.dataset.checked) return;
      groupWrap.dataset.checked = '1';
      checkBtn.disabled = true; revBtn.disabled = true;

      let gc = 0;
      const allRows = groupWrap.querySelectorAll('.tl-item');
      allRows.forEach(row => {
        const rId = row.id.replace('tl-row-','');
        const ans = row.dataset.ans;
        const chosen = selections[rId];
        const isRight = chosen === ans;
        if (isRight) gc++;

        Object.entries(rowBtnMap[rId]).forEach(([l, b]) => {
          if (l === ans) b.style.cssText = (isRight && l === chosen) ? TL_CORRECT : TL_REVEAL;
          else if (l === chosen && !isRight) b.style.cssText = TL_WRONG;
          else { b.style.cssText = TL_DEFAULT; b.style.cursor = 'default'; }
        });
        document.getElementById('tl-year-' + rId).classList.add('show');
      });

      totalCorrect += gc;
      totalAnswered += allRows.length;
      hint.textContent = gc + ' / ' + allRows.length + ' helyes';
      hint.style.color = gc === allRows.length ? '#2e7d4f' : '#aa3333';
      updateScore();
    }

    checkBtn.addEventListener('click', evaluate);
    revBtn.addEventListener('click', () => {
      if (groupWrap.dataset.checked) return;
      groupWrap.dataset.checked = '1';
      checkBtn.disabled = true; revBtn.disabled = true;

      const allRows = groupWrap.querySelectorAll('.tl-item');
      allRows.forEach(row => {
        const rId = row.id.replace('tl-row-','');
        Object.entries(rowBtnMap[rId]).forEach(([l, b]) => {
          b.style.cssText = l === row.dataset.ans ? TL_REVEAL : TL_DEFAULT;
          b.style.cursor = 'default';
        });
        document.getElementById('tl-year-' + rId).classList.add('show');
      });
      totalAnswered += allRows.length;
      hint.textContent = 'Megoldás megmutatva';
      hint.style.color = 'var(--dim)';
      updateScore();
    });

    bottomRow.appendChild(checkBtn);
    bottomRow.appendChild(revBtn);
    bottomRow.appendChild(hint);
    groupWrap.appendChild(bottomRow);
    wrap.appendChild(groupWrap);
  });

  return wrap;
}

// ─────────────────────────────────────────────
// EXAM MODE LOGIC
// ─────────────────────────────────────────────
let examState = null;

function enterExamMode() {
  document.getElementById('main-content').style.display = 'none';
  document.getElementById('main-nav').style.display = 'none';
  document.getElementById('exam-view').classList.add('visible');
  document.getElementById('exam-active').classList.remove('visible');
  document.getElementById('exam-active').innerHTML = '';
  document.getElementById('exam-picker').style.display = 'block';
  document.getElementById('exam-mode-btn').textContent = '← Vissza a tesztekhez';
  document.getElementById('exam-mode-btn').onclick = exitExamMode;
  renderExamPicker();
}

function exitExamMode() {
  document.getElementById('main-content').style.display = '';
  document.getElementById('main-nav').style.display = '';
  document.getElementById('exam-view').classList.remove('visible');
  document.getElementById('exam-mode-btn').textContent = '📝 Vizsgázás';
  document.getElementById('exam-mode-btn').onclick = enterExamMode;
  examState = null;
}

function renderExamPicker() {
  const picker = document.getElementById('exam-picker');
  picker.innerHTML = '<h2>Válassz vizsgalapot!</h2><div class="exam-cards"></div>';
  const cards = picker.querySelector('.exam-cards');
  EXAMS.forEach(exam => {
    const card = document.createElement('div');
    card.className = 'exam-card';
    card.innerHTML = '<h3>'+exam.title+'</h3><p>'+exam.desc+'</p>';
    card.onclick = () => startExam(exam);
    cards.appendChild(card);
  });
}

function startExam(exam) {
  document.getElementById('exam-picker').style.display = 'none';
  const active = document.getElementById('exam-active');
  active.classList.add('visible');
  active.innerHTML = '';
  examState = { sel:{}, tlSel:{}, totalC:0, totalA:0, done:false, log:[] };

  const backBtn = document.createElement('button');
  backBtn.className = 'exam-back';
  backBtn.textContent = '← Vizsgalap-választó';
  backBtn.onclick = () => {
    document.getElementById('exam-picker').style.display = 'block';
    active.classList.remove('visible');
    active.innerHTML = '';
    examState = null;
  };
  active.appendChild(backBtn);

  const title = document.createElement('div');
  title.style.cssText = 'font-family:"Playfair Display",serif;font-size:1.2rem;color:var(--gold);margin-bottom:1.5rem;padding-bottom:.75rem;border-bottom:1px solid var(--border);';
  title.textContent = exam.title;
  active.appendChild(title);

  const cardMaps = {};
  const rowMaps = {};

  exam.blocks.forEach(blk => {
    const wrap = document.createElement('div');
    wrap.style.marginBottom = '2rem';

    const bTitle = document.createElement('div');
    bTitle.style.cssText = 'font-size:.95rem;font-weight:bold;color:var(--gold);margin-bottom:.25rem;';
    bTitle.textContent = blk.title;
    wrap.appendChild(bTitle);

    if (blk.sub) {
      const bSub = document.createElement('div');
      bSub.style.cssText = 'font-size:.78rem;color:var(--dim);margin-bottom:.8rem;';
      bSub.textContent = blk.sub;
      wrap.appendChild(bSub);
    }

    if (blk.type === 'q') {
      cardMaps[blk.id] = [];
      blk.items.forEach((item, ii) => {
        const num = blk.num + ii;
        const card = document.createElement('div');
        card.className = 'eq-card';

        const body = document.createElement('div');
        body.className = 'eq-body';
        body.innerHTML = '<span class="eq-num">'+num+'.</span><span class="eq-text">'+item.q+'</span>';
        const res = document.createElement('span');
        res.className = 'eq-res';
        body.appendChild(res);

        const opts = document.createElement('div');
        opts.className = 'eq-opts';
        const bm = {};

        blk.opts.forEach(o => {
          const b = document.createElement('button');
          b.style.cssText = ED;
          b.textContent = o.l;
          bm[o.v] = b;
          b.addEventListener('click', () => {
            if (examState.done) return;
            Object.values(bm).forEach(x => x.style.cssText = ED);
            b.style.cssText = EDS;
            examState.sel[blk.id+'_'+ii] = o.v;
            checkExamReady(exam, hint);
          });
          opts.appendChild(b);
        });

        card._bm = bm; card._ans = item.ans; card._exp = item.exp;
        const exp = document.createElement('div');
        exp.className = 'eq-exp';
        exp.textContent = item.exp;

        card.appendChild(body); card.appendChild(opts); card.appendChild(exp);
        wrap.appendChild(card);
        cardMaps[blk.id].push(card);
      });
    } else {
      rowMaps[blk.id] = [];
      blk.groups.forEach(g => {
        const box = document.createElement('div');
        box.className = 'eq-tl-box';
        const shuffled = [...g.items].sort(() => Math.random() - .5);
        shuffled.forEach((item, ii) => {
          const rid = blk.id+'_'+ii;
          const row = document.createElement('div');
          row.className = 'eq-tl-row';
          row.dataset.ans = item.letter;

          const og = document.createElement('div');
          og.className = 'eq-tl-opts';
          const bm = {};
          ['A','B','C','D','E'].forEach(l => {
            const b = document.createElement('button');
            b.style.cssText = ED; b.textContent = l; bm[l] = b;
            b.addEventListener('click', () => {
              if (examState.done) return;
              Object.values(bm).forEach(x => x.style.cssText = ED);
              b.style.cssText = EDS;
              examState.tlSel[rid] = l;
              checkExamReady(exam, hint);
            });
            og.appendChild(b);
          });
          row._bm = bm; row._letter = item.letter; row._year = item.year;

          const lbl = document.createElement('span');
          lbl.className = 'eq-tl-label'; lbl.textContent = item.label;
          const yr = document.createElement('span');
          yr.className = 'eq-tl-year'; yr.textContent = item.year;

          row.appendChild(og); row.appendChild(lbl); row.appendChild(yr);
          box.appendChild(row);
          rowMaps[blk.id].push({row, rid, item});
        });
        wrap.appendChild(box);
      });
    }
    active.appendChild(wrap);
  });

  // toolbar
  const toolbar = document.createElement('div');
  toolbar.className = 'exam-toolbar';

  const checkBtn = document.createElement('button');
  checkBtn.textContent = 'Ellenőrzés';

  const revBtn = document.createElement('button');
  revBtn.textContent = 'Mutasd a válaszokat';

  const hint = document.createElement('span');
  hint.className = 'exam-hint';
  hint.textContent = 'Töltsd ki az összes kérdést!';

  const resultBox = document.createElement('div');
  resultBox.className = 'result-box';
  resultBox.innerHTML = '<h3>Eredményeid – másold be és küldd el</h3><pre id="exam-result-text"></pre><button style="margin-top:.6rem;font-size:13px;" onclick="copyExamResult()">Másolás</button>';

  function allDone() {
    for (const blk of exam.blocks) {
      if (blk.type === 'q') {
        for (let i = 0; i < blk.items.length; i++) {
          if (!examState.sel[blk.id+'_'+i]) return false;
        }
      } else {
        for (const g of blk.groups) {
          for (let i = 0; i < g.items.length; i++) {
            if (!examState.tlSel[blk.id+'_'+i]) return false;
          }
        }
      }
    }
    return true;
  }

  function checkExamReady(exam, hint) {
    hint.textContent = allDone() ? 'Kész! Nyomd meg az Ellenőrzést.' : 'Töltsd ki az összes kérdést!';
  }

  checkBtn.addEventListener('click', () => {
    if (!allDone()) { hint.textContent = 'Még nem töltötted ki az összes kérdést!'; return; }
    examState.done = true;
    checkBtn.disabled = true; revBtn.disabled = true;
    examState.log = [];

    exam.blocks.forEach(blk => {
      examState.log.push('\n' + blk.title);
      if (blk.type === 'q') {
        cardMaps[blk.id].forEach((card, ii) => {
          const chosen = examState.sel[blk.id+'_'+ii] || '–';
          const ans = card._ans;
          const isRight = chosen === ans;
          if (isRight) examState.totalC++;
          examState.totalA++;

          Object.entries(card._bm).forEach(([v,b]) => {
            if (v===ans) b.style.cssText = (isRight&&v===chosen)?EDC:EDR;
            else if (v===chosen&&!isRight) b.style.cssText = EDW;
            else { b.style.cssText = ED; b.style.cursor='default'; }
          });

          const res = card.querySelector('.eq-res');
          res.textContent = isRight?'✓':'✗';
          res.style.color = isRight?'#2e7d4f':'#aa3333';
          card.querySelector('.eq-exp').classList.add('show');
          card.classList.add(isRight?'ok':'err');
          examState.log.push((blk.num+ii)+'. '+(isRight?'✓':'✗')+' Te: '+chosen+' | Helyes: '+ans);
        });
      } else {
        rowMaps[blk.id].forEach((r, ri) => {
          const chosen = examState.tlSel[r.rid] || '–';
          const ans = r.item.letter;
          const isRight = chosen === ans;
          if (isRight) examState.totalC++;
          examState.totalA++;

          Object.entries(r.row._bm).forEach(([l,b]) => {
            if (l===ans) b.style.cssText = (isRight&&l===chosen)?EDC:EDR;
            else if (l===chosen&&!isRight) b.style.cssText = EDW;
            else { b.style.cssText = ED; b.style.cursor='default'; }
          });
          r.row.querySelector('.eq-tl-year').classList.add('show');
          examState.log.push(r.item.label+': Te: '+chosen+' | Helyes: '+ans+' ('+r.item.year+') '+(isRight?'✓':'✗'));
        });
      }
    });

    hint.textContent = examState.totalC + ' / ' + examState.totalA + ' helyes';
    hint.style.color = examState.totalC === examState.totalA ? '#2e7d4f' : '#aa3333';
    document.getElementById('exam-result-text').textContent = 'EREDMÉNY: '+examState.totalC+'/'+examState.totalA+'\n'+examState.log.join('\n');
    resultBox.classList.add('show');
  });

  revBtn.addEventListener('click', () => {
    examState.done = true;
    checkBtn.disabled = true; revBtn.disabled = true;
    exam.blocks.forEach(blk => {
      if (blk.type === 'q') {
        cardMaps[blk.id].forEach(card => {
          Object.entries(card._bm).forEach(([v,b]) => {
            b.style.cssText = v===card._ans?EDR:ED; b.style.cursor='default';
          });
          card.querySelector('.eq-exp').classList.add('show');
          card.classList.add('rev');
        });
      } else {
        rowMaps[blk.id].forEach(r => {
          Object.entries(r.row._bm).forEach(([l,b]) => {
            b.style.cssText = l===r.row._letter?EDR:ED; b.style.cursor='default';
          });
          r.row.querySelector('.eq-tl-year').classList.add('show');
        });
      }
    });
    hint.textContent = 'Megoldás megmutatva';
  });

  toolbar.appendChild(checkBtn);
  toolbar.appendChild(revBtn);
  toolbar.appendChild(hint);
  active.appendChild(toolbar);
  active.appendChild(resultBox);
}

function copyExamResult() {
  const txt = document.getElementById('exam-result-text').textContent;
  navigator.clipboard.writeText(txt).then(()=>alert('Másolva!')).catch(()=>alert('Jelöld ki és másold be kézzel.'));
}


// ─────────────────────────────────────────────
// INIT
// ─────────────────────────────────────────────
buildNav();
buildSections();
updateScore();
</script>
